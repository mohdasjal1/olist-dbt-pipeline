# schema.yml - Marts Layer
version: 2

models:

  - name: fct_orders
    description: "Central fact table. One row per order. All delivery, payment, and review metrics."
    columns:
      - name: order_id
        tests:
          - not_null
          - unique

      - name: customer_id
        tests:
          - not_null

      - name: order_status
        tests:
          - not_null

      - name: total_payment_value
        tests:
          - not_null

  - name: fct_order_items
    description: "Item-level fact table. One row per item. Revenue by product/category/seller."
    columns:
      - name: order_id
        tests:
          - not_null

      - name: order_item_id
        tests:
          - not_null

      - name: product_id
        tests:
          - not_null

      - name: item_price
        tests:
          - not_null

  - name: dim_customers
    description: "Customer dimension. One row per customer_unique_id."
    columns:
      - name: customer_unique_id
        tests:
          - not_null
          - unique

      - name: customer_state
        tests:
          - not_null

  - name: dim_products
    description: "Product dimension with English category names and sales performance."
    columns:
      - name: product_id
        tests:
          - not_null
          - unique

      - name: category_name_en
        tests:
          - not_null

  - name: dim_sellers
    description: "Seller dimension with full KPIs including cancellation rate and review score."
    columns:
      - name: seller_id
        tests:
          - not_null
          - unique

      - name: seller_tier
        tests:
          - not_null
          - accepted_values:
              values: ['Platinum', 'Gold', 'Silver', 'Bronze']
