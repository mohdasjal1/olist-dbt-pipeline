# schema.yml - Intermediate Layer
version: 2

models:

  - name: int_orders_enriched
    description: "Orders enriched with customer location and payment summary. Delivery time metrics computed."
    columns:
      - name: order_id
        tests:
          - not_null
          - unique

      - name: order_status
        tests:
          - not_null

      - name: total_payment_value
        tests:
          - not_null

  - name: int_sellers_performance
    description: "Seller KPIs: revenue, cancellation rate, avg review score, seller tier."
    columns:
      - name: seller_id
        tests:
          - not_null
          - unique

  - name: int_customers_enriched
    description: "Customers enriched with lat/lng geolocation from zip code prefix lookup."
    columns:
      - name: customer_id
        tests:
          - not_null
          - unique
